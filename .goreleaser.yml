project_name: cftunnelX

builds:
  - env: [CGO_ENABLED=0]
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/shiranzby/cftunnelX/cmd.Version={{.Version}}

archives:
  - format: tar.gz
    name_template: "cftunnelX_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

release:
  github:
    owner: shiranzby
    name: cftunnelX
