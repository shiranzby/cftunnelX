<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060b;--surface:#0d0d14;--surface2:#14141f;--surface3:#1a1a28;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --text:#e8e8f0;--text2:#7a7a95;--text3:#50506a;
  --accent:#3b82f6;--accent2:#60a5fa;--accent-glow:rgba(59,130,246,.15);
  --green:#22c55e;--green-glow:rgba(34,197,94,.12);
  --orange:#f59e0b;--purple:#a855f7;--red:#ef4444;
  --glass:rgba(255,255,255,.03);--glass2:rgba(255,255,255,.05);
}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
a{color:var(--accent2);text-decoration:none;transition:color .2s}
a:hover{color:#93c5fd}
::selection{background:var(--accent);color:#fff}
.container{max-width:1120px;margin:0 auto;padding:0 28px}
section{padding:100px 0;position:relative}

/* жһҒе…үиғҢжҷҜ */
.aurora{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;overflow:hidden}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.35;animation:aurora-drift 20s ease-in-out infinite alternate}
.aurora-blob:nth-child(1){width:600px;height:600px;background:radial-gradient(circle,rgba(59,130,246,.3),transparent 70%);top:-200px;left:-100px}
.aurora-blob:nth-child(2){width:500px;height:500px;background:radial-gradient(circle,rgba(34,197,94,.2),transparent 70%);top:-150px;right:-100px;animation-delay:-7s}
.aurora-blob:nth-child(3){width:400px;height:400px;background:radial-gradient(circle,rgba(168,85,247,.15),transparent 70%);bottom:20%;left:30%;animation-delay:-14s}
@keyframes aurora-drift{0%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,40px) scale(1.1)}66%{transform:translate(-40px,80px) scale(.95)}100%{transform:translate(30px,-30px) scale(1.05)}}

/* еҜјиҲӘ */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(6,6,11,.8);backdrop-filter:blur(20px) saturate(1.2);border-bottom:1px solid var(--border);transition:all .3s}
nav.scrolled{background:rgba(6,6,11,.95);box-shadow:0 4px 30px rgba(0,0,0,.3)}
nav .container{display:flex;align-items:center;justify-content:space-between;height:60px}
nav .logo{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.5px}
nav .logo span{background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav .nav-links{display:flex;align-items:center;gap:28px;font-size:14px}
nav .nav-links a{color:var(--text2);font-weight:500;position:relative;padding:4px 0}
nav .nav-links a:hover{color:var(--text)}
nav .nav-links a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2px;background:var(--accent);border-radius:1px;transition:width .3s}
nav .nav-links a:hover::after{width:100%}
.gh-star{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.15);border-radius:8px;font-size:13px;font-weight:600;color:var(--text)!important;transition:all .3s;white-space:nowrap}
.gh-star:hover{border-color:var(--accent);background:var(--accent-glow);transform:translateY(-1px);box-shadow:0 4px 16px rgba(59,130,246,.2)}
.gh-star svg{flex-shrink:0}

/* Hero */
.hero{padding:160px 0 100px;text-align:center;position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;background:var(--glass2);border:1px solid var(--border2);border-radius:100px;font-size:13px;color:var(--text2);margin-bottom:28px;animation:fade-up .8s ease-out}
.hero-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.hero h1{font-size:clamp(36px,6vw,64px);font-weight:800;letter-spacing:-2px;line-height:1.1;margin-bottom:20px;animation:fade-up .8s ease-out .1s both}
.hero h1 .gradient{background:linear-gradient(135deg,var(--accent2) 0%,var(--green) 50%,var(--accent2) 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:gradient-shift 4s ease-in-out infinite}
@keyframes gradient-shift{0%{background-position:0% center}50%{background-position:100% center}100%{background-position:0% center}}
.hero .subtitle{font-size:clamp(16px,2.5vw,20px);color:var(--text2);max-width:620px;margin:0 auto 44px;line-height:1.7;animation:fade-up .8s ease-out .2s both}
@keyframes fade-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* з»Ҳз«Ҝ */
.terminal{background:var(--surface);border:1px solid var(--border2);border-radius:12px;overflow:hidden;max-width:640px;margin:0 auto;animation:fade-up .8s ease-out .3s both;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.terminal-bar{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border)}
.terminal-dot{width:10px;height:10px;border-radius:50%}
.terminal-dot:nth-child(1){background:#ef4444}
.terminal-dot:nth-child(2){background:#f59e0b}
.terminal-dot:nth-child(3){background:#22c55e}
.terminal-bar .term-title{margin-left:auto;font-size:12px;color:var(--text3)}
.terminal-body{padding:20px;font-family:"SF Mono",Monaco,"Cascadia Code",Consolas,monospace;font-size:14px;line-height:1.8;min-height:90px}
.terminal-body .prompt{color:var(--green)}
.terminal-body .cmd{color:var(--text)}
.terminal-body .output{color:var(--accent2)}
.terminal-body .flag{color:var(--orange)}
.typing-cursor{display:inline-block;width:8px;height:16px;background:var(--accent2);margin-left:2px;animation:blink 1s step-end infinite;vertical-align:text-bottom}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* з»Ҳз«Ҝ Tab */
.term-tabs{display:flex;gap:0;margin-bottom:0;padding:0 16px;background:var(--surface2)}
.term-tab{padding:8px 20px;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .3s;font-family:inherit}
.term-tab:hover{color:var(--text2)}
.term-tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.term-panel{display:none}
.term-panel.active{display:block}

/* CTA жҢүй’® */
.cta-group{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:48px;animation:fade-up .8s ease-out .4s both;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .3s;border:none;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--accent),#2563eb);color:#fff;box-shadow:0 4px 20px rgba(59,130,246,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(59,130,246,.4);color:#fff}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border2);backdrop-filter:blur(10px)}
.btn-outline:hover{border-color:var(--accent);background:var(--accent-glow);color:var(--text);transform:translateY(-2px)}

/* з»ҹи®Ўж•°еӯ— */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:600px;margin:0 auto;animation:fade-up .8s ease-out .5s both}
.stat{text-align:center}
.stat-num{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:13px;color:var(--text3);margin-top:4px}

/* еҢәеқ—ж Үйўҳ */
.section-header{text-align:center;margin-bottom:56px}
.section-header .tag{display:inline-block;padding:4px 14px;background:var(--accent-glow);border:1px solid rgba(59,130,246,.2);border-radius:100px;font-size:12px;font-weight:600;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px}
.section-header h2{font-size:clamp(28px,4vw,40px);font-weight:800;letter-spacing:-1px;margin-bottom:12px}
.section-header p{color:var(--text2);font-size:16px;max-width:560px;margin:0 auto}

/* зү№жҖ§еҚЎзү?*/
.features-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.feature-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:28px 24px;transition:all .4s;position:relative;overflow:hidden}
.feature-card:hover{border-color:var(--border2);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.feature-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .4s}
.feature-card:hover::before{opacity:1}
.feature-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:20px}
.feature-icon.blue{background:var(--accent-glow);color:var(--accent2)}
.feature-icon.green{background:var(--green-glow);color:var(--green)}
.feature-icon.orange{background:rgba(245,158,11,.12);color:var(--orange)}
.feature-icon.purple{background:rgba(168,85,247,.12);color:var(--purple)}
.feature-icon.red{background:rgba(239,68,68,.12);color:var(--red)}
.feature-card h3{font-size:16px;font-weight:700;margin-bottom:8px}
.feature-card p{font-size:13px;color:var(--text2);line-height:1.6}
.feature-card.highlight{border-color:rgba(59,130,246,.2);background:linear-gradient(135deg,rgba(59,130,246,.05),rgba(34,197,94,.03))}
.feature-card.highlight-relay{border-color:rgba(168,85,247,.2);background:linear-gradient(135deg,rgba(168,85,247,.05),rgba(245,158,11,.03))}

/* жһ¶жһ„еӣ?*/
.arch-dual{display:grid;grid-template-columns:1fr 1fr;gap:32px}
.arch-diagram{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:32px 28px;text-align:center}
.arch-diagram h3{font-size:18px;font-weight:700;margin-bottom:24px}
.arch-diagram h3 .mode-cloud{color:var(--accent2)}
.arch-diagram h3 .mode-relay{color:var(--purple)}
.arch-flow{display:flex;flex-direction:column;align-items:center;gap:0}
.arch-node{padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid var(--border2);background:var(--surface2);position:relative;min-width:200px}
.arch-node.local{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.08)}
.arch-node.tool{border-color:rgba(59,130,246,.3);background:rgba(59,130,246,.08)}
.arch-node.relay-tool{border-color:rgba(168,85,247,.3);background:rgba(168,85,247,.08)}
.arch-node.edge{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.08)}
.arch-node.public{border-color:rgba(96,165,250,.3);background:rgba(96,165,250,.08)}
.arch-arrow{color:var(--text3);font-size:18px;padding:6px 0;display:flex;align-items:center;justify-content:center}
.arch-arrow span{font-size:11px;color:var(--text3);margin-left:8px}

/* еҜ№жҜ”иЎ?*/
.compare-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.compare-table{width:100%;border-collapse:collapse;background:var(--glass);border:1px solid var(--border);border-radius:14px;overflow:hidden;font-size:14px}
.compare-table th,.compare-table td{padding:14px 20px;text-align:left;border-bottom:1px solid var(--border)}
.compare-table thead th{background:var(--surface2);font-weight:700;font-size:15px;color:var(--text)}
.compare-table thead th:nth-child(2){color:var(--accent2)}
.compare-table thead th:nth-child(3){color:var(--purple)}
.compare-table tbody tr:last-child td{border-bottom:none}
.compare-table tbody tr:hover{background:var(--glass2)}
.compare-table td:first-child{font-weight:600;color:var(--text2)}

/* е‘Ҫд»ӨйҖҹжҹҘ */
.cmd-tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:1px solid var(--border)}
.cmd-tab{padding:10px 24px;font-size:14px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .3s}
.cmd-tab:hover{color:var(--text2)}
.cmd-tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.cmd-panel{display:none}
.cmd-panel.active{display:block}
.cmd-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cmd-item{display:flex;flex-direction:column;gap:4px;padding:14px 18px;background:var(--glass);border:1px solid var(--border);border-radius:10px;transition:all .3s}
.cmd-item:hover{border-color:var(--border2);background:var(--glass2)}
.cmd-code{font-family:"SF Mono",Monaco,Consolas,monospace;font-size:13px;color:var(--green);word-break:break-all}
.cmd-desc{font-size:12px;color:var(--text3)}

/* ж•…йҡңжҺ’жҹҘ */
.trouble-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:28px 24px;transition:all .4s}
.card:hover{border-color:var(--border2);transform:translateY(-2px)}
.card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:18px;background:rgba(239,68,68,.1);color:var(--red)}
.card h3{font-size:15px;font-weight:700;margin-bottom:8px}
.card p{font-size:13px;color:var(--text2);line-height:1.6}
.card code{background:var(--surface2);padding:2px 7px;border-radius:4px;font-size:12px;color:var(--orange);font-family:"SF Mono",Monaco,Consolas,monospace}

/* е®үиЈ… */
.install-box{background:var(--glass);border:1px solid var(--border);border-radius:14px;overflow:hidden;max-width:700px;margin:0 auto}
.install-tabs{display:flex;border-bottom:1px solid var(--border)}
.install-tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .3s;border-bottom:2px solid transparent}
.install-tab:hover{color:var(--text2)}
.install-tab.active{color:var(--accent2);border-bottom-color:var(--accent);background:var(--glass2)}
.install-panel{display:none;padding:24px}
.install-panel.active{display:block}
.install-panel pre{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;overflow-x:auto;font-size:13px;line-height:1.7;font-family:"SF Mono",Monaco,Consolas,monospace;color:var(--green)}

/* еҝ«йҖҹдёҠжү?*/
.qs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.qs-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:28px 24px;transition:all .4s}
.qs-card:hover{border-color:var(--border2);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.qs-card .qs-step{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-size:13px;font-weight:700;margin-bottom:14px}
.qs-card .qs-step.blue{background:var(--accent-glow);color:var(--accent2);border:1px solid rgba(59,130,246,.3)}
.qs-card .qs-step.green{background:var(--green-glow);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.qs-card .qs-step.purple{background:rgba(168,85,247,.12);color:var(--purple);border:1px solid rgba(168,85,247,.3)}
.qs-card h3{font-size:16px;font-weight:700;margin-bottom:10px}
.qs-card p{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.qs-card pre{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;line-height:1.7;font-family:"SF Mono",Monaco,Consolas,monospace;color:var(--green);overflow-x:auto}

/* жЎҢйқўе®ўжҲ·з«?*/
.desktop-card{background:var(--glass);border:1px solid var(--border);border-radius:14px;padding:40px;text-align:center;max-width:700px;margin:0 auto}
.desktop-card h3{font-size:22px;font-weight:700;margin-bottom:10px}
.desktop-card p{color:var(--text2);font-size:14px;margin-bottom:24px}
.desktop-card .dl-links{display:flex;justify-content:center;gap:12px;flex-wrap:wrap}
.desktop-card .dl-links a{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;font-size:13px;font-weight:600;color:var(--text);transition:all .3s}
.desktop-card .dl-links a:hover{border-color:var(--accent);background:var(--accent-glow);transform:translateY(-2px)}

/* Footer */
footer{border-top:1px solid var(--border);padding:40px 0;text-align:center;position:relative;z-index:1}
footer p{font-size:13px;color:var(--text3)}
footer a{color:var(--text2)}
footer a:hover{color:var(--accent2)}
footer .footer-links{display:flex;justify-content:center;gap:24px;margin-bottom:12px;font-size:13px}

/* ж»ҡеҠЁеҠЁз”» */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .7s ease-out,transform .7s ease-out}
.reveal.visible{opacity:1;transform:translateY(0)}

/* е“Қеә”еј?*/
@media(max-width:900px){
  .features-grid{grid-template-columns:repeat(2,1fr)}
  .arch-dual{grid-template-columns:1fr}
  .cmd-grid{grid-template-columns:1fr}
  .qs-grid{grid-template-columns:1fr}
  .trouble-grid{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(4,1fr);gap:16px}
  nav .nav-links a:not(.gh-star){display:none}
  .container{padding:0 20px}
  .terminal{max-width:100%}
  .install-box{max-width:100%}
  .compare-table{font-size:13px}
  .compare-table th,.compare-table td{padding:10px 14px}
}
@media(max-width:768px){
  .features-grid{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
  section{padding:60px 0}
  .hero{padding:120px 0 60px}
  .hero h1{font-size:32px;letter-spacing:-1px}
  .hero .subtitle{font-size:15px}
  .cta-group{flex-direction:column;gap:12px}
  .cta-group .btn{width:100%;justify-content:center}
