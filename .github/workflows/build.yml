name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cli:
    name: CLI ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Test
        run: go test ./...
      - name: Build CLI
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-dev}"
          go build -buildvcs=false -ldflags "-s -w -X github.com/shiranzby/cftunnelX/cmd.Version=${VERSION}" -o "dist/cftunnelX-${VERSION}-${GOOS}-${GOARCH}${{ matrix.ext }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: cftunnelX-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  windows-gui:
    name: Windows browser GUI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Build Windows GUI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          go build -buildvcs=false -ldflags "-s -w -H=windowsgui -X github.com/shiranzby/cftunnelX/cmd.Version=$version" -o "dist/cftunnelX-$version-windows-gui.exe" .
      - uses: actions/upload-artifact@v4
        with:
          name: cftunnelX-windows-browser-gui
          path: dist/*

  wails:
    name: Wails ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-latest
            artifact: desktop-client/build/bin/cftunnelX-desktop.exe
          - os: linux
            runner: ubuntu-latest
            artifact: desktop-client/build/bin/cftunnelX-desktop
          - os: macos
            runner: macos-latest
            artifact: desktop-client/build/bin/*
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-client/frontend/package-lock.json
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Install frontend dependencies
        working-directory: desktop-client/frontend
        run: npm ci
      - name: Build Wails desktop
        working-directory: desktop-client
        run: wails build -clean
      - uses: actions/upload-artifact@v4
        with:
          name: cftunnelX-wails-${{ matrix.os }}
          path: ${{ matrix.artifact }}

  release:
    name: Release artifacts
    if: startsWith(github.ref, 'refs/tags/')
    needs: [cli, windows-gui, wails]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Pack artifacts
        run: |
          find artifacts -type f -maxdepth 3 -print
          cd artifacts
          for d in *; do zip -r "../${d}.zip" "$d"; done
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
