name: Build

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  cli:
    name: CLI ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - runner: ubuntu-latest
            goos: linux
            goarch: arm64
            ext: ""
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Test
        run: go test ./...
      - name: Build CLI
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME:-dev}"
          go build -buildvcs=false -ldflags "-s -w -X github.com/shiranzby/cftunnelX/cmd.Version=${VERSION}" -o "dist/cftunnelX-${VERSION}-${GOOS}-${GOARCH}${{ matrix.ext }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: cftunnelX-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
      - name: Upload CLI to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  windows-gui:
    name: Windows browser GUI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Build Windows GUI
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $version = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { "dev" }
          go build -buildvcs=false -ldflags "-s -w -H=windowsgui -X github.com/shiranzby/cftunnelX/cmd.Version=$version" -o "dist/cftunnelX-$version-windows-gui.exe" .
      - uses: actions/upload-artifact@v4
        with:
          name: cftunnelX-windows-browser-gui
          path: dist/*
      - name: Upload Windows GUI to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  windows-portable:
    name: Windows portable
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-client/frontend/package-lock.json
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Install frontend dependencies
        working-directory: desktop-client/frontend
        run: npm ci
      - name: Cache cloudflared
        id: cache-cloudflared
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\cloudflared\cloudflared.exe
          key: cloudflared-windows-amd64-2026.6.1
      - name: Build portable package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = $env:GITHUB_REF_NAME
          New-Item -ItemType Directory -Force dist | Out-Null
          go build -buildvcs=false -ldflags "-s -w -H=windowsgui -X github.com/shiranzby/cftunnelX/cmd.Version=$version" -o "dist/cftunnelX-$version.exe" .
          go build -buildvcs=false -ldflags "-s -w -X github.com/shiranzby/cftunnelX/cmd.Version=$version" -o "dist/cftunnelX-$version-cli.exe" .
          Push-Location desktop-client
          wails build -clean
          Pop-Location

          $cloudflaredVersion = "2026.6.1"
          $cloudflaredZip = "cloudflared-windows-amd64.exe"
          $cloudflaredUrl = "https://github.com/cloudflare/cloudflared/releases/download/$cloudflaredVersion/$cloudflaredZip"
          $cacheDir = Join-Path $env:RUNNER_TEMP "cloudflared"
          New-Item -ItemType Directory -Force $cacheDir | Out-Null
          $cloudflaredPath = Join-Path $cacheDir "cloudflared.exe"
          if (-not (Test-Path $cloudflaredPath)) {
            Invoke-WebRequest -Uri $cloudflaredUrl -OutFile $cloudflaredPath
          }
          $versionText = & $cloudflaredPath version
          if ($versionText -notmatch $cloudflaredVersion) {
            throw "cloudflared version check failed: $versionText"
          }

          $portableRoot = Join-Path (Resolve-Path dist) "cftunnelX-$version-windows-portable"
          Remove-Item -Recurse -Force $portableRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $portableRoot | Out-Null
          New-Item -ItemType Directory -Force (Join-Path $portableRoot "config\bin") | Out-Null
          New-Item -ItemType Directory -Force (Join-Path $portableRoot "log") | Out-Null
          Copy-Item "dist\cftunnelX-$version.exe" (Join-Path $portableRoot "cftunnelX.exe")
          Copy-Item "dist\cftunnelX-$version-cli.exe" (Join-Path $portableRoot "cftunnelX-cli.exe")
          Copy-Item "desktop-client\build\bin\cftunnelX-desktop.exe" (Join-Path $portableRoot "cftunnelX-desktop.exe")
          Copy-Item $cloudflaredPath (Join-Path $portableRoot "config\bin\cloudflared.exe")
          Copy-Item README.md (Join-Path $portableRoot "README.md")
          Copy-Item LICENSE (Join-Path $portableRoot "LICENSE") -ErrorAction SilentlyContinue
          if (Test-Path "internal\web\static\logo.png") { Copy-Item "internal\web\static\logo.png" (Join-Path $portableRoot "logo.png") }
          @"
          cftunnelX Windows Portable

          - cftunnelX.exe: 浏览器 GUI 双击版
          - cftunnelX-desktop.exe: Wails 桌面客户端
          - cftunnelX-cli.exe: CLI 版本
          - config/: 本目录下的配置文件
          - config/bin/cloudflared.exe: 内置 cloudflared $cloudflaredVersion
          - log/: 本目录下的日志文件
          "@ | Set-Content -Path (Join-Path $portableRoot "PORTABLE-README.txt") -Encoding UTF8
          Compress-Archive -Path $portableRoot -DestinationPath "dist\cftunnelX-$version-windows-portable.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: cftunnelX-windows-portable
          path: dist/*windows-portable.zip
      - name: Upload portable to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*windows-portable.zip

  wails:
    name: Wails ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runner: windows-latest
            artifact: desktop-client/build/bin/cftunnelX-desktop.exe
          - os: linux
            runner: ubuntu-22.04
            artifact: desktop-client/build/bin/cftunnelX-desktop
          - os: macos
            runner: macos-latest
            artifact: desktop-client/build/bin/*
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-client/frontend/package-lock.json
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Install frontend dependencies
        working-directory: desktop-client/frontend
        run: npm ci
      - name: Build Wails desktop
        working-directory: desktop-client
        run: wails build -clean
      - uses: actions/upload-artifact@v4
        with:
          name: cftunnelX-wails-${{ matrix.os }}
          path: ${{ matrix.artifact }}
      - name: Upload Wails desktop to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

  docker:
    name: Docker multi-arch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cftunnelx
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  openwrt-ipk:
    name: OpenWrt IPK ${{ matrix.goarch }}${{ matrix.goarm }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            goarm: ""
            pkgarch: x86_64
          - goarch: arm64
            goarm: ""
            pkgarch: aarch64_generic
          - goarch: arm
            goarm: "7"
            pkgarch: arm_cortex-a7
          - goarch: mipsle
            goarm: ""
            pkgarch: mipsel_24kc
          - goarch: mips
            goarm: ""
            pkgarch: mips_24kc
          - goarch: riscv64
            goarm: ""
            pkgarch: riscv64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Build OpenWrt binary
        shell: bash
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          mkdir -p build/openwrt
          go build -buildvcs=false -trimpath -ldflags "-s -w -X github.com/shiranzby/cftunnelX/cmd.Version=${VERSION}" -o build/openwrt/cftunnelX .
      - name: Pack IPK
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          chmod +x scripts/pack-openwrt-ipk.sh
          scripts/pack-openwrt-ipk.sh "$VERSION" "${{ matrix.pkgarch }}" build/openwrt/cftunnelX "dist"
      - uses: actions/upload-artifact@v4
        with:
          name: cftunnelX-openwrt-${{ matrix.pkgarch }}
          path: dist/*.ipk
      - name: Upload OpenWrt IPK to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.ipk
